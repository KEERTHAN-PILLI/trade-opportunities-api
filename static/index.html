<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Opportunities Analyst | India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .navbar {
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        main {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 0 2rem 4rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto;
        }

        .search-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 3rem;
            position: sticky;
            top: 2rem;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .search-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 1rem 2rem;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        #report {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            line-height: 1.7;
        }

        #report h1, #report h2, #report h3 {
            font-family: 'Outfit', sans-serif;
            margin: 2rem 0 1rem;
            color: white;
        }

        #report h1 { font-size: 2.25rem; border-bottom: 2px solid var(--primary); padding-bottom: 0.5rem; }
        #report h2 { font-size: 1.75rem; color: var(--primary); }
        
        #report ul, #report ol {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }

        #report li {
            margin-bottom: 0.75rem;
        }

        #report strong {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            margin: 3rem auto;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
            border: 3px solid var(--bg);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        .examples {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .example-chip {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .example-chip:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">TRADE GPT</div>
    </nav>

    <main>
        <div class="hero">
            <h1>Indian Market Insights <br> in Seconds.</h1>
            <p>Leverage Gemini AI to analyze real-time market news and discover trade opportunities across Indian sectors.</p>
        </div>

        <div class="search-container">
            <input type="text" id="sectorInput" placeholder="Enter sector (e.g. Pharmaceuticals, FinTech...)" value="Pharmaceuticals">
            <button onclick="analyze()">
                Analyze
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>
        </div>

        <div class="examples">
            <span class="example-chip" onclick="setInput('Automotive')">Automotive</span>
            <span class="example-chip" onclick="setInput('Agriculture')">Agriculture</span>
            <span class="example-chip" onclick="setInput('Renewable Energy')">Renewable Energy</span>
            <span class="example-chip" onclick="setInput('IT Services')">IT Services</span>
        </div>

        <div class="loader" id="loader"></div>
        <div id="report"></div>
    </main>

    <script>
        function setInput(val) {
            document.getElementById('sectorInput').value = val;
            analyze();
        }

        async function analyze() {
            const sector = document.getElementById('sectorInput').value;
            if (!sector) return;

            const loader = document.getElementById('loader');
            const reportDiv = document.getElementById('report');
            
            // UI States
            loader.style.display = 'block';
            reportDiv.style.display = 'none';
            reportDiv.innerHTML = '';

            try {
                const response = await fetch(`/analyze/${sector}`, {
                    headers: {
                        'X-API-Key': 'default_secret_key'
                    }
                });

                if (response.ok) {
                    const text = await response.text();
                    reportDiv.innerHTML = marked.parse(text);
                    reportDiv.style.display = 'block';
                } else {
                    const err = await response.json();
                    reportDiv.innerHTML = `<h2 style="color: #ef4444">Error</h2><p>${err.detail || 'Failed to analyze sector'}</p>`;
                    reportDiv.style.display = 'block';
                }
            } catch (err) {
                reportDiv.innerHTML = `<h2 style="color: #ef4444">Connection Error</h2><p>Could not reach the API server.</p>`;
                reportDiv.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
